/**/event_broadcaster:
  ros__parameters:
    # Optional. Empty string means a robot with no prefix (state/server_state).
    # Empty array can be interpreted as NOT_SET by Jazzy in this path,
    # so use [""] for single-robot/no-prefix behavior.
    # Example values:
    # robot_prefixes: [""]
    # robot_prefixes: [robot1, ""]
    # robot_prefixes: [robot1, robot2]
    robot_prefixes: [""]
